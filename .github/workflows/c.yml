name: C Build

on:
  push:
    branches: [ "main", "task4-implementation" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install GCC
      run: sudo apt-get install -y gcc make

    - name: Build project
      run: make

    - name: Run check
      run: make check

    - name: Run distcheck
      run: make distcheck
